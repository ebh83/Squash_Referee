<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Squash Referee</title>
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #17171b;
      --surface-2: #1f1f24;
      --border: #2a2a30;
      --text: #f5f5f7;
      --muted: #8e8e93;
      --faint: #5a5a60;
      --accent: #1f9a5b;
      --accent-dim: #174d34;
      --danger: #e5484d;
      --warn: #f5a524;
      --info: #3b82f6;
      --radius: 10px;
      --radius-sm: 6px;
      --gap: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Inter, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      letter-spacing: -0.01em;
      -webkit-user-select: none;
      user-select: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

    h1, h2, h3 { font-weight: 600; letter-spacing: -0.02em; }
    .title-lg { font-size: 28px; font-weight: 700; }

    /* Setup */
    .setup {
      flex: 1; padding: 32px 24px; overflow-y: auto;
      max-width: 520px; margin: 0 auto; width: 100%;
    }
    .setup-header { margin-bottom: 32px; }
    .setup-header .brand {
      font-size: 11px; letter-spacing: 0.15em; color: var(--accent);
      font-weight: 700; text-transform: uppercase; margin-bottom: 6px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 6px; font-weight: 500;
    }
    .field input, .field select {
      width: 100%; padding: 12px 14px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text);
      font-size: 15px; border-radius: var(--radius-sm);
      font-family: inherit; -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

    /* Buttons */
    .btn {
      padding: 12px 16px; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; -webkit-appearance: none; appearance: none;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--muted); }
    .btn-block { width: 100%; }
    .btn-lg { padding: 14px 18px; font-size: 15px; font-weight: 600; }
    .btn-sm { padding: 8px 12px; font-size: 13px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Match */
    .match { display: flex; flex-direction: column; height: 100%; background: var(--bg); }

    .score-header {
      flex: 0 0 auto; padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    .score-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: center;
    }
    .score-side {
      text-align: center; padding: 10px 8px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); position: relative;
    }
    .score-side.serving { border-color: var(--accent); background: var(--surface-2); }
    .score-side .player {
      font-size: 12px; color: var(--muted); margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .score-side .value {
      font-size: 42px; font-weight: 700; color: var(--text); line-height: 1;
      letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
    }
    .score-side .games { font-size: 11px; color: var(--faint); margin-top: 4px; }
    .score-side .serve-dot {
      position: absolute; top: 6px; right: 8px; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent); display: none;
    }
    .score-side.serving .serve-dot { display: block; }
    .score-middle { font-size: 12px; color: var(--faint); text-align: center; font-variant-numeric: tabular-nums; }

    .point-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }

    .tabs {
      flex: 0 0 auto; display: flex; padding: 0 12px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 12px 8px; background: transparent; border: none;
      color: var(--muted); font-size: 13px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    .tab-content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 11px; color: var(--muted); font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
    }

    .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .action-grid .btn { padding: 14px 8px; font-size: 13px; }

    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-top: 10px;
    }
    .panel h4 { font-size: 13px; margin-bottom: 10px; color: var(--text); font-weight: 600; }
    .panel-row { display: flex; gap: 8px; }
    .panel-row .btn { flex: 1; }

    .call-input {
      width: 100%; padding: 12px 14px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text); font-size: 14px;
      border-radius: var(--radius-sm); font-family: inherit;
      margin-bottom: 8px; -webkit-appearance: none;
    }
    .call-input:focus { outline: none; border-color: var(--accent); }

    .call-result {
      padding: 12px 14px; background: var(--surface); border-radius: var(--radius-sm);
      border-left: 3px solid var(--muted); margin-top: 10px;
    }
    .call-result .name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .call-result .detail { font-size: 12px; color: var(--muted); line-height: 1.45; }

    .log {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); max-height: 260px; overflow-y: auto;
    }
    .log-entry {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-empty { padding: 20px; color: var(--faint); font-size: 13px; text-align: center; }

    .camera-section { display: flex; flex-direction: column; gap: 12px; }
    .camera-viewport {
      position: relative; width: 100%; aspect-ratio: 16 / 9;
      background: #000; border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
    }
    .camera-viewport video { width: 100%; height: 100%; object-fit: cover; }
    .detection-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .tracking-status {
      position: absolute; top: 10px; right: 10px;
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; background: rgba(0,0,0,0.6);
      border-radius: 20px; font-size: 11px; color: #fff; font-weight: 600;
      max-width: 70%;
    }
    .tracking-status .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--info);
    }
    .tracking-status.loading .dot { background: var(--warn); animation: pulse 1.2s infinite; }
    .tracking-status.error .dot { background: var(--danger); }
    .camera-off {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: var(--faint); font-size: 13px; background: var(--surface);
    }
    .camera-controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .camera-controls .btn { flex: 1; min-width: 80px; }

    .rec-indicator {
      position: absolute; top: 10px; left: 10px;
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; background: rgba(0,0,0,0.6);
      border-radius: 20px; font-size: 11px; color: #fff; font-weight: 600;
    }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .clip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
    .clip-item {
      aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); display: flex; align-items: center;
      justify-content: center; font-size: 13px; color: var(--muted);
      cursor: pointer; font-weight: 500;
    }
    .clip-item.selected { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

    .review-video-wrap {
      position: relative; width: 100%; background: #000;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border); margin-top: 10px;
    }
    .review-video-wrap video { width: 100%; display: block; max-height: 360px; }
    .review-error {
      padding: 14px; background: var(--surface); border-radius: var(--radius-sm);
      color: var(--danger); font-size: 13px;
    }

    .empty-state {
      padding: 24px 16px; text-align: center; color: var(--faint);
      font-size: 13px; background: var(--surface);
      border: 1px dashed var(--border); border-radius: var(--radius);
    }

    .flash-overlay {
      position: fixed; inset: 0; background: rgba(31, 154, 91, 0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; animation: flashOut 1s forwards; pointer-events: none;
    }
    @keyframes flashOut {
      0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; }
    }
    .flash-text {
      font-size: 48px; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px); display: flex;
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; text-align: center;
      min-width: 280px; max-width: 90%;
    }
    .modal h2 { font-size: 22px; margin-bottom: 20px; }

    .insecure-banner {
      background: var(--danger); color: #fff; padding: 10px 16px;
      font-size: 13px; text-align: center;
    }

    /* Call-type colored buttons */
    .btn-call-let    { background: rgba(59,130,246,0.14); border-color: rgba(59,130,246,0.45); color: #93c5fd; }
    .btn-call-stroke { background: rgba(245,165,36,0.14); border-color: rgba(245,165,36,0.45); color: #fbbf24; }
    .btn-call-nolet  { background: rgba(229,72,77,0.14);  border-color: rgba(229,72,77,0.45);  color: #fca5a5; }

    /* Themed flash overlays (used to be always green) */
    .flash-overlay.flash-let    { background: rgba(59,130,246,0.92); }
    .flash-overlay.flash-stroke { background: rgba(245,165,36,0.92); }
    .flash-overlay.flash-nolet  { background: rgba(229,72,77,0.92); }
    .flash-overlay.flash-info   { background: rgba(31,154,91,0.92); }

    /* Score header polish */
    .score-side .games {
      font-size: 13px; color: var(--muted); margin-top: 6px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .score-side .serve-dot {
      width: 10px; height: 10px; top: 8px; right: 10px;
      box-shadow: 0 0 0 3px rgba(31,154,91,0.18);
    }
    .score-middle {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 0 4px;
    }
    .score-middle .game-label {
      font-size: 10px; color: var(--muted); letter-spacing: 0.12em;
      text-transform: uppercase; font-weight: 600;
    }
    .score-middle .game-num {
      font-size: 18px; color: var(--text); font-weight: 700;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .score-middle .game-context {
      font-size: 10px; color: var(--warn); letter-spacing: 0.08em;
      text-transform: uppercase; font-weight: 700; margin-top: 2px;
      padding: 2px 6px; background: rgba(245,165,36,0.14);
      border-radius: 4px; white-space: nowrap;
    }
    .score-middle .game-context.match-ball { color: var(--danger); background: rgba(229,72,77,0.14); }

    /* Tab icons */
    .tab { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab-icon { width: 16px; height: 16px; flex-shrink: 0; }

    /* Clip thumbnails with duration label */
    .clip-item {
      position: relative; aspect-ratio: 1; padding: 0; overflow: hidden;
    }
    .clip-item .clip-num {
      position: absolute; top: 4px; left: 6px;
      font-size: 11px; color: var(--muted); font-weight: 600;
    }
    .clip-item .clip-duration {
      position: absolute; bottom: 4px; right: 6px;
      font-size: 11px; color: var(--text); font-weight: 600;
      background: rgba(0,0,0,0.55); padding: 1px 5px; border-radius: 3px;
      font-variant-numeric: tabular-nums;
    }
    .clip-item .clip-icon {
      width: 22px; height: 22px; color: var(--muted); opacity: 0.6;
    }
    .clip-item.selected .clip-icon { color: var(--text); opacity: 1; }

    /* Setup polish */
    .setup-header { position: relative; }
    .setup-header::before {
      content: ''; position: absolute; top: -16px; left: -8px;
      width: 60px; height: 60px; border-radius: 50%;
      background: radial-gradient(circle, rgba(31,154,91,0.25) 0%, transparent 70%);
      filter: blur(8px); pointer-events: none;
    }
    .setup-header .brand { position: relative; }
    .setup-header h1 { position: relative; }
    .setup-header .tagline {
      font-size: 13px; color: var(--muted); margin-top: 8px;
      max-width: 360px;
    }

    /* Match-over modal upgraded */
    .modal-wide { min-width: 320px; max-width: 420px; text-align: left; padding: 24px; }
    .modal-wide h2 { text-align: center; margin-bottom: 8px; }
    .modal-wide .winner {
      text-align: center; color: var(--accent); font-size: 16px; font-weight: 600;
      margin-bottom: 4px;
    }
    .modal-wide .duration {
      text-align: center; color: var(--muted); font-size: 12px;
      margin-bottom: 18px; font-variant-numeric: tabular-nums;
    }
    .modal-wide .game-row {
      display: grid; grid-template-columns: 60px 1fr auto;
      gap: 12px; align-items: center;
      padding: 10px 12px; background: var(--surface-2);
      border-radius: var(--radius-sm); margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .modal-wide .game-row .label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .modal-wide .game-row .scores { font-size: 14px; color: var(--text); font-weight: 600; }
    .modal-wide .game-row .winner-tag {
      font-size: 11px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .modal-wide .modal-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px;
    }

    /* Pane wrappers — control visibility per breakpoint */
    .pane { display: block; }

    /* Responsive 2/3-column layout for tablet/desktop */
    @media (min-width: 760px) and (orientation: landscape) {
      .match { display: grid; grid-template-rows: auto 1fr; height: 100%; }
      .tabs { display: none; }
      .tab-content {
        display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 0; padding: 0; overflow: hidden;
      }
      .tab-content > .pane {
        overflow-y: auto; padding: 16px;
        border-right: 1px solid var(--border);
      }
      .tab-content > .pane:last-child { border-right: none; }
      .score-header { padding: 16px 24px 14px; }
      .score-side .value { font-size: 56px; }
    }
    @media (min-width: 1080px) {
      .tab-content {
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr) minmax(0, 0.9fr);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    function SquashReferee() {
      const [screen, setScreen] = useState('setup');

      // Setup
      const [playerA, setPlayerA] = useState('Player A');
      const [playerB, setPlayerB] = useState('Player B');
      const [bestOf, setBestOf] = useState(3);
      const [pointsTo, setPointsTo] = useState(11);
      const [firstServer, setFirstServer] = useState('A');

      // Match
      const [scoreA, setScoreA] = useState(0);
      const [scoreB, setScoreB] = useState(0);
      const [gamesA, setGamesA] = useState(0);
      const [gamesB, setGamesB] = useState(0);
      const [server, setServer] = useState(firstServer);
      const [matchOver, setMatchOver] = useState(false);
      const [callLog, setCallLog] = useState([]);
      const [gameHistory, setGameHistory] = useState([]);
      const [matchStartTime, setMatchStartTime] = useState(null);
      const [matchEndTime, setMatchEndTime] = useState(null);

      // Call assistant
      const [callInput, setCallInput] = useState('');
      const [callResult, setCallResult] = useState(null);

      // Camera
      const [cameraActive, setCameraActive] = useState(false);
      const [cameraStream, setCameraStream] = useState(null);
      const [facingMode, setFacingMode] = useState('user');
      const videoRefCamera = useRef(null);

      // Recording
      const [recording, setRecording] = useState(false);
      const mediaRecorderRef = useRef(null);
      const recordingChunks = useRef([]);
      const recordingStartedAt = useRef(null);

      // Player tracking (COCO-SSD)
      const [trackingEnabled, setTrackingEnabled] = useState(false);
      const [trackingStatus, setTrackingStatus] = useState('idle'); // idle | loading | running | error
      const [playerASide, setPlayerASide] = useState('left'); // which side of viewport is Player A
      const playerASideRef = useRef('left');
      useEffect(() => { playerASideRef.current = playerASide; }, [playerASide]);
      const detectionModelRef = useRef(null);
      const detectionCanvasRef = useRef(null);
      const detectionRafRef = useRef(null);
      const detectionLastRunRef = useRef(0);

      // Viewport — used to flip between mobile tabs and desktop panes
      const [isWide, setIsWide] = useState(() => {
        if (typeof window === 'undefined' || !window.matchMedia) return false;
        return window.matchMedia('(min-width: 760px) and (orientation: landscape)').matches;
      });
      useEffect(() => {
        if (typeof window === 'undefined' || !window.matchMedia) return;
        const mq = window.matchMedia('(min-width: 760px) and (orientation: landscape)');
        const handler = (e) => setIsWide(e.matches);
        if (mq.addEventListener) mq.addEventListener('change', handler);
        else mq.addListener(handler);
        return () => {
          if (mq.removeEventListener) mq.removeEventListener('change', handler);
          else mq.removeListener(handler);
        };
      }, []);

      // Clips
      const [clips, setClips] = useState([]);
      const [reviewClip, setReviewClip] = useState(null);
      const [reviewVideoError, setReviewVideoError] = useState(false);

      // Panels
      const [interferenceWizard, setInterferenceWizard] = useState(false);
      const [interferenceStep, setInterferenceStep] = useState(0);
      const [serviceFaultPanel, setServiceFaultPanel] = useState(false);
      const [ballCallPanel, setBallCallPanel] = useState(false);

      const [activeTab, setActiveTab] = useState('match');
      const [flashText, setFlashText] = useState(null);
      const flashTimeout = useRef(null);

      // Secure-context check
      const isSecure = window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const hasMediaDevices = typeof navigator !== 'undefined' && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

      // Bind stream once <video> is mounted
      useEffect(() => {
        const v = videoRefCamera.current;
        if (v && cameraStream) {
          v.srcObject = cameraStream;
          const p = v.play();
          if (p && p.catch) p.catch((err) => console.warn('play() failed:', err));
        } else if (v && !cameraStream) {
          v.srcObject = null;
        }
      }, [cameraStream, cameraActive]);

      useEffect(() => {
        return () => {
          if (cameraStream) cameraStream.getTracks().forEach((t) => t.stop());
          if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
            try { mediaRecorderRef.current.stop(); } catch (e) {}
          }
          if (detectionRafRef.current) cancelAnimationFrame(detectionRafRef.current);
        };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      const startCamera = useCallback(async () => {
        if (!hasMediaDevices) {
          alert('Camera API not available. Serve this page over HTTPS or localhost.');
          return;
        }
        // Cascading fallback: many laptop webcams don't expose facingMode and
        // throw OverconstrainedError, so degrade to any camera / no audio.
        const attempts = [
          { video: { facingMode }, audio: true },
          { video: { facingMode: { ideal: facingMode } }, audio: true },
          { video: true, audio: true },
          { video: true, audio: false },
        ];
        let lastErr;
        for (const constraints of attempts) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            setCameraStream(stream);
            setCameraActive(true);
            return;
          } catch (err) {
            lastErr = err;

          { video: { facingMode: newMode }, audio: true },
          { video: { facingMode: { ideal: newMode } }, audio: true },
          { video: true, audio: true },
          { video: true, audio: false },

        for (const constraints of attempts) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            setCameraStream(stream);
            setCameraActive(true);

            console.warn('Flip getUserMedia failed for', constraints, err.name);

          'video/mp4', 'video/mp4;codecs=h264',
          'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm',
        ];
        let mimeType = '';
        for (const type of supportedTypes) {
          try {
            if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(type)) {
              mimeType = type; break;
            }
          } catch (e) {}
        }
        let recorder;
        try {
          recorder = mimeType
            ? new MediaRecorder(cameraStream, { mimeType })
            : new MediaRecorder(cameraStream);

          console.error('MediaRecorder init error:', err);
          alert('Unable to start recording: ' + (err.message || err.name));
          return;

      const drawDetections = useCallback((predictions) => {
        const canvas = detectionCanvasRef.current;
        const video = videoRefCamera.current;
        if (!canvas || !video || !video.videoWidth) return;
        if (canvas.width !== video.videoWidth) canvas.width = video.videoWidth;
        if (canvas.height !== video.videoHeight) canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const persons = predictions
          .filter((p) => p.class === 'person' && p.score > 0.4)
          .sort((a, b) => (b.bbox[2] * b.bbox[3]) - (a.bbox[2] * a.bbox[3]));
        const labeled = persons.slice(0, 2);
        const others = persons.slice(2);

        const midX = canvas.width / 2;
        const sideForA = playerASideRef.current;
        const labelFor = (bbox) => {
          const cx = bbox[0] + bbox[2] / 2;
          const isLeft = cx < midX;
          if (sideForA === 'left') return isLeft ? 'A' : 'B';
          return isLeft ? 'B' : 'A';
        };
        const colorFor = (label) => label === 'A' ? '#3b82f6' : '#f5a524';

        ctx.lineWidth = Math.max(2, canvas.width / 320);
        ctx.font = `${Math.max(14, canvas.width / 40)}px -apple-system, sans-serif`;
        ctx.textBaseline = 'top';

        for (const p of labeled) {
          const [x, y, w, h] = p.bbox;
          const label = labelFor(p.bbox);
          const color = colorFor(label);
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.strokeRect(x, y, w, h);
          const tag = `${label}  ${(p.score * 100).toFixed(0)}%`;
          const tagW = ctx.measureText(tag).width + 12;
          const tagH = parseInt(ctx.font, 10) + 8;
          ctx.fillRect(x, Math.max(0, y - tagH), tagW, tagH);
          ctx.fillStyle = '#fff';
          ctx.fillText(tag, x + 6, Math.max(0, y - tagH) + 4);
        }
        ctx.lineWidth = Math.max(1, canvas.width / 480);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        for (const p of others) {
          const [x, y, w, h] = p.bbox;
          ctx.strokeRect(x, y, w, h);

      const analyzeCall = useCallback((text) => {

          if (D.selfCreated && !D.swingBlock) return R("No Let","interference","#e5484d","Self-created interference. No Let.","8.8.2");
          if (D.fishing) return R("No Let","interference","#e5484d","Fishing for a call. No Let.","8.6");
          if (D.minimal && !D.swing && !D.swingBlock && !D.winning) return R("No Let","interference","#e5484d","Minimal interference. No Let.","8.6.4");
          if (D.excessSwing) return R("No Let","interference","#e5484d","Excessive swing caused it. No Let.","8.10.1");
          if (D.farFromBall && D.noEffort) return R("No Let","interference","#e5484d","Far from ball, no effort. No Let.","8.6.2");
          if (D.noEffortOpp && !D.farFromBall && !D.effortOpp) { if (D.deliberate) return R("Stroke","interference","#f5a524","Deliberate block. Stroke.","8.6.5"); return R("Stroke","interference","#f5a524","Opponent didn't clear. Stroke.","8.6.5"); }
          if (D.toFront && !D.toSide && D.blocked && !D.effortOpp) return R("Stroke","interference","#f5a524","Front wall blocked. Stroke.","8.11.1");
          if (D.winning && D.blocked) return R("Stroke","interference","#f5a524","Winning return prevented. Stroke.","8.6.7");
          if (has(["completely prevented","zero access","no access","no way past","no way through","total block"]) && !D.farFromBall) return R("Stroke","interference","#f5a524","Complete block. Stroke.","8.6.5");
          if (D.blocked && D.farFromBall) return R("Let","interference","#3b82f6","Blocked but ball was far. Let.","8.6.6");
          if (D.effortOpp && D.blocked) return R("Let","interference","#3b82f6","Opponent tried to clear. Let.","8.6.6");
          if (D.toFront && D.effortOpp) return R("Let","interference","#3b82f6","Front wall, opponent made effort. Let.","8.11.1");
          if (D.toSide && D.blocked) { if (D.winning) return R("Stroke","interference","#f5a524","Side wall, winning blocked. Stroke.","8.11.2"); return R("Let","interference","#3b82f6","Side wall interference. Let.","8.11.2"); }
          if (D.bodyContact && !D.selfCreated) return R("Let","interference","#3b82f6","Physical contact. Let.","8.6.6");
          if (D.dangerous || D.heldBack) return R("Let","interference","#3b82f6","Held back for safety. Let.","8.6.6");
          if (D.both) return R("Let","interference","#3b82f6","Both at fault. Let.","8.6.6");
          if (D.blocked || D.noRoom) { if (D.noEffortOpp) return R("Stroke","interference","#f5a524","Blocked, no effort to clear. Stroke.","8.6.5"); return R("Let","interference","#3b82f6","Interference occurred. Let.","8.6.6"); }
          return R("Let","interference","#3b82f6","Interference. Let — rally replayed.","8.6.6");
        }
        if (D.winner) return R("Point — Winner","point","#1f9a5b","Clean winner. Point awarded.","");
        return { call: "Unclear", type: "unknown", color: "#8e8e93", detail: "Describe what happened: \"blocked my swing\", \"in the way but tried to move\", \"ball hit him going to front wall\", \"turned and he was there\", \"took wrong line\"" };
      }, []);

      const flashKindForCall = (callName) => {
        const c = (callName || '').toLowerCase();
        if (c.includes('no let')) return 'nolet';
        if (c.includes('stroke')) return 'stroke';
        if (c.includes('let')) return 'let';
        return 'info';
      };

      const handleCallSubmit = useCallback(() => {
        if (!callInput.trim()) return;
        const result = analyzeCall(callInput);
        setCallResult(result);
        addCallLog(`Call: ${result.call} — ${result.detail}`);
        flash(result.call, flashKindForCall(result.call));
        setCallInput('');
      }, [callInput, analyzeCall, addCallLog, flash]);

      const interferenceQuestions = [
        { q: 'Did player intentionally interfere?', yes: 'Stroke', no: 'Let' },
        { q: 'Contact with ball?', yes: 'Stroke', no: 'Let' },
        { q: 'Deliberate action?', yes: 'Stroke', no: 'Let' },
      ];
      const handleInterferenceAnswer = (yes) => {
        const answer = yes ? interferenceQuestions[interferenceStep].yes : interferenceQuestions[interferenceStep].no;
        addCallLog(`Interference: ${answer}`);
        flash(answer, flashKindForCall(answer));
        setInterferenceWizard(false);
        setInterferenceStep(0);
      };

      if (screen === 'setup') {
        return (
          <div className="setup">
            {!isSecure && (
              <div className="insecure-banner">
                Page is not on a secure context. Camera access requires HTTPS or localhost.
              </div>
            )}
            <div className="setup-header">
              <div className="brand">Squash</div>
              <h1 className="title-lg">Referee</h1>
              <div className="tagline">PAR scoring, WSF 2025 rule assistant, and on-court video review.</div>
            </div>

            <div className="field"><label>Player A</label>
              <input type="text" value={playerA} onChange={(e) => setPlayerA(e.target.value)} /></div>
            <div className="field"><label>Player B</label>
              <input type="text" value={playerB} onChange={(e) => setPlayerB(e.target.value)} /></div>
            <div className="field"><label>Format</label>
              <select value={bestOf} onChange={(e) => setBestOf(Number(e.target.value))}>
                <option value={3}>Best of 3</option><option value={5}>Best of 5</option>
              </select></div>
            <div className="field"><label>Points per game</label>
              <select value={pointsTo} onChange={(e) => setPointsTo(Number(e.target.value))}>
                <option value={11}>11</option><option value={15}>15</option>
              </select></div>
            <div className="field"><label>First server</label>
              <select value={firstServer} onChange={(e) => setFirstServer(e.target.value)}>
                <option value="A">{playerA}</option><option value="B">{playerB}</option>
              </select></div>

            <button className="btn btn-primary btn-block btn-lg" style={{ marginTop: 16 }}
              onClick={() => { setServer(firstServer); setScreen('match'); }}>
              Start match
            </button>
          </div>
        );
      }

      const currentGameNum = gamesA + gamesB + 1;
      const totalGames = bestOf;
      const winsNeeded = Math.floor(bestOf / 2) + 1;
      const aAtGameBall = scoreA === pointsTo - 1;
      const bAtGameBall = scoreB === pointsTo - 1;
      const aWouldClinch = aAtGameBall && (gamesA + 1 >= winsNeeded);
      const bWouldClinch = bAtGameBall && (gamesB + 1 >= winsNeeded);
      const isMatchBall = aWouldClinch || bWouldClinch;
      const isGameBall = aAtGameBall || bAtGameBall;

      return (
        <div className="match">
          <div className="score-header">
            <div className="score-row">
              <div className={`score-side ${server === 'A' ? 'serving' : ''}`}>
                <div className="serve-dot" />
                <div className="player">{playerA}</div>
                <div className="value">{scoreA}</div>
                <div className="games">Games {gamesA}</div>
              </div>
              <div className="score-middle">
                <div className="game-label">Game</div>
                <div className="game-num">{currentGameNum}<span style={{ color: 'var(--faint)', fontWeight: 500 }}> / {totalGames}</span></div>
                {isMatchBall && <div className="game-context match-ball">Match ball</div>}
                {!isMatchBall && isGameBall && <div className="game-context">Game ball</div>}
              </div>
              <div className={`score-side ${server === 'B' ? 'serving' : ''}`}>
                <div className="serve-dot" />
                <div className="player">{playerB}</div>
                <div className="value">{scoreB}</div>
                <div className="games">Games {gamesB}</div>
              </div>
            </div>
            <div className="point-row">
              <button className="btn btn-primary" onClick={pointWonByA} disabled={matchOver}>+ {playerA}</button>
              <button className="btn btn-primary" onClick={pointWonByB} disabled={matchOver}>+ {playerB}</button>
            </div>
          </div>

          <div className="tabs">
            <button className={`tab ${activeTab === 'match' ? 'active' : ''}`} onClick={() => setActiveTab('match')}>
              <svg className="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
              Calls
            </button>
            <button className={`tab ${activeTab === 'video' ? 'active' : ''}`} onClick={() => setActiveTab('video')}>
              <svg className="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
              Video
            </button>
            <button className={`tab ${activeTab === 'log' ? 'active' : ''}`} onClick={() => setActiveTab('log')}>
              <svg className="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              Log
            </button>
          </div>

          <div className="tab-content">
            {(isWide || activeTab === 'match') && (
              <div className="pane pane-calls">
                <div className="section">
                  <div className="section-title">Referee actions</div>
                  <div className="action-grid">
                    <button className="btn btn-call-let" onClick={() => { addCallLog('Let'); flash('LET', 'let'); }}>Let</button>
                    <button className="btn btn-call-stroke" onClick={() => { addCallLog('Stroke'); flash('STROKE', 'stroke'); }}>Stroke</button>
                    <button className="btn btn-call-nolet" onClick={() => { addCallLog('No Let'); flash('NO LET', 'nolet'); }}>No Let</button>
                    <button className="btn" onClick={() => setServiceFaultPanel(!serviceFaultPanel)}>Service fault</button>
                    <button className="btn" onClick={() => setBallCallPanel(!ballCallPanel)}>Ball call</button>
                    <button className="btn" onClick={() => setInterferenceWizard(!interferenceWizard)}>Interference</button>
                  </div>

                  {serviceFaultPanel && (
                    <div className="panel"><h4>Service fault</h4>
                      <div className="panel-row">
                        <button className="btn" onClick={() => { addCallLog('Fault — Illegal serve'); setServiceFaultPanel(false); }}>Illegal</button>
                        <button className="btn" onClick={() => { addCallLog('Fault — Foot fault'); setServiceFaultPanel(false); }}>Foot fault</button>
                      </div>
                      <button className="btn btn-ghost btn-block btn-sm" style={{ marginTop: 8 }} onClick={() => setServiceFaultPanel(false)}>Cancel</button>
                    </div>
                  )}

                  {ballCallPanel && (
                    <div className="panel"><h4>Ball call</h4>
                      <div className="panel-row">
                        <button className="btn" onClick={() => { addCallLog('Out'); setBallCallPanel(false); }}>Out</button>
                        <button className="btn" onClick={() => { addCallLog('Down'); setBallCallPanel(false); }}>Down</button>
                        <button className="btn" onClick={() => { addCallLog('Not up'); setBallCallPanel(false); }}>Not up</button>
                      </div>
                      <button className="btn btn-ghost btn-block btn-sm" style={{ marginTop: 8 }} onClick={() => setBallCallPanel(false)}>Cancel</button>
                    </div>
                  )}

                  {interferenceWizard && interferenceStep < interferenceQuestions.length && (
                    <div className="panel">
                      <div style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Decision tree</div>
                      <h4>{interferenceQuestions[interferenceStep].q}</h4>
                      <div className="panel-row">
                        <button className="btn btn-primary" onClick={() => handleInterferenceAnswer(true)}>Yes</button>
                        <button className="btn" onClick={() => handleInterferenceAnswer(false)}>No</button>
                      </div>
                    </div>
                  )}
                </div>

                <div className="section">
                  <div className="section-title">Call assistant</div>
                  <input type="text" className="call-input" placeholder="Describe the call…"
                    value={callInput}
                    onChange={(e) => setCallInput(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleCallSubmit()} />
                  <button className="btn btn-primary btn-block" onClick={handleCallSubmit}>Analyze</button>
                  {callResult && (
                    <div className="call-result" style={{ borderLeftColor: callResult.color }}>
                      <div className="name">{callResult.call}</div>
                      <div className="detail">{callResult.detail}</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {(isWide || activeTab === 'video') && (
              <div className="pane pane-video">
                <div className="camera-section">
                {!isSecure && (
                  <div className="insecure-banner" style={{ borderRadius: 6 }}>
                    Camera needs HTTPS or localhost to work.
                  </div>
                )}
                <div className="section-title">Camera</div>
                <div className="camera-viewport">
                  {cameraActive
                    ? <video ref={videoRefCamera} playsInline autoPlay muted />
                    : <div className="camera-off">Camera is off</div>}
                  {cameraActive && (
                    <canvas ref={detectionCanvasRef} className="detection-canvas" />
                  )}
                  {recording && (
                    <div className="rec-indicator"><div className="rec-dot" />REC</div>
                  )}
                  {cameraActive && trackingEnabled && (
                    <div className={`tracking-status ${trackingStatus === 'loading' ? 'loading' : trackingStatus === 'error' ? 'error' : ''}`}>
                      <div className="dot" />
                      {trackingStatus === 'loading' ? 'Loading model…' :
                       trackingStatus === 'error' ? 'Model error' : 'Tracking'}
                    </div>
                  )}
                </div>

                <div className="camera-controls">
                  {!cameraActive && <button className="btn btn-primary" onClick={startCamera}>Start camera</button>}
                  {cameraActive && !recording && <button className="btn btn-danger" onClick={startRecording}>● Record</button>}
                  {cameraActive && recording && <button className="btn btn-danger" onClick={stopRecording}>■ Stop</button>}
                  {cameraActive && (<>
                    <button className="btn" onClick={flipCamera}>Flip</button>
                    {!trackingEnabled
                      ? <button className="btn" onClick={startTracking}>Track players</button>
                      : <button className="btn" onClick={stopTracking}>Stop tracking</button>}
                    {trackingEnabled && trackingStatus === 'running' && (
                      <button className="btn btn-ghost" onClick={() => setPlayerASide(playerASide === 'left' ? 'right' : 'left')}>
                        Swap A↔B
                      </button>
                    )}
                    <button className="btn btn-ghost" onClick={stopCamera}>Off</button>
                  </>)}
                </div>

                <div className="section" style={{ marginTop: 16 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <div className="section-title">Clips ({clips.length})</div>
                    {clips.length > 0 && (
                      <button className="btn btn-ghost btn-sm" onClick={deleteAllClips}>Delete all</button>
                    )}
                  </div>
                  {clips.length === 0 ? (
                    <div className="empty-state">No clips yet. Press Record to capture one.</div>
                  ) : (
                    <div className="clip-grid">
                      {clips.map((clip, idx) => (
                        <div key={clip.id}
                          className={`clip-item ${reviewClip?.id === clip.id ? 'selected' : ''}`}
                          onClick={() => { setReviewClip(clip); setReviewVideoError(false); }}>
                          <div className="clip-num">{idx + 1}</div>
                          <svg className="clip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                          {clip.durationMs > 0 && (
                            <div className="clip-duration">{formatDuration(clip.durationMs)}</div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}

                  {reviewClip && (
                    <>
                      <div className="review-video-wrap">
                        {!reviewVideoError ? (
                          <video key={reviewClip.id} src={reviewClip.url}
                            controls playsInline autoPlay
                            onError={() => setReviewVideoError(true)} />
                        ) : (
                          <div className="review-error">Unable to load video.</div>
                        )}
                      </div>
                      <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                        <button className="btn btn-ghost btn-sm" style={{ flex: 1 }}
                          onClick={() => { setReviewClip(null); setReviewVideoError(false); }}>Close</button>
                        <button className="btn btn-sm" style={{ flex: 1 }}
                          onClick={() => downloadClip(reviewClip)}>Download</button>
                        <button className="btn btn-danger btn-sm" style={{ flex: 1 }}
                          onClick={() => deleteClip(reviewClip)}>Delete</button>
                      </div>
                    </>
                  )}
                </div>
                </div>
              </div>
            )}

            {(isWide || activeTab === 'log') && (
              <div className="pane pane-log">
                <div className="section">
                  <div className="section-title">Call log</div>
                  <div className="log">
                    {callLog.length === 0 ? (
                      <div className="log-empty">No calls yet</div>
                    ) : (
                      callLog.slice().reverse().map((entry, idx) => (
                        <div key={idx} className="log-entry">{entry}</div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>

          {flashText && (
            <div className={`flash-overlay flash-${flashText.kind || 'info'}`}>
              <div className="flash-text">{flashText.text}</div>
            </div>
          )}

          {matchOver && (() => {
            const winner = gamesA > gamesB ? playerA : playerB;
            const winGames = Math.max(gamesA, gamesB);
            const loseGames = Math.min(gamesA, gamesB);
            const totalMs = matchEndTime && matchStartTime ? matchEndTime - matchStartTime : 0;
            return (
              <div className="modal-backdrop">
                <div className="modal modal-wide">
                  <h2>Match over</h2>
                  <div className="winner">{winner} wins {winGames}–{loseGames}</div>
                  <div className="duration">Match duration: {formatDuration(totalMs)}</div>
                  {gameHistory.map((g) => (
                    <div key={g.gameNum} className="game-row">
                      <div className="label">Game {g.gameNum}</div>
                      <div className="scores">{g.scoreA} – {g.scoreB}</div>
                      <div className="winner-tag">{g.winner === 'A' ? playerA : playerB}</div>
                    </div>
                  ))}
                  <button className="btn btn-primary btn-block" style={{ marginTop: 16 }} onClick={() => {
                    setScoreA(0); setScoreB(0); setGamesA(0); setGamesB(0);
                    setMatchOver(false); setCallLog([]); setGameHistory([]);
                    setMatchStartTime(null); setMatchEndTime(null);
                    setScreen('setup');
                  }}>New match</button>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SquashReferee));
  </script>
</body>
</html>
